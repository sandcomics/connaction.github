<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Publicar - CONAVERSE</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<style>






#intro-screen {
  position: fixed;
  inset: 0;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.8s ease;
}
#intro-screen.ocultar {
  opacity: 0;
  pointer-events: none;
}
.intro-logo {
  width: 90vw;
  max-width: 700px;
}
.intro-logo svg {
  width: 100%;
  height: auto;
}
.linea-sombra {
  fill: none;
  stroke: rgba(0,140,80,0.12);
  stroke-width: 38;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 1300;
  stroke-dashoffset: 1300;
  animation: dibujar 2s cubic-bezier(0.77,0,0.18,1) forwards;
}
.linea-principal {
  fill: none;
  stroke: url(#grad-conalep);
  stroke-width: 26;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 1300;
  stroke-dashoffset: 1300;
  animation: dibujar 2s cubic-bezier(0.77,0,0.18,1) forwards;
}
.linea-top    { animation-delay: 0.1s; }
.linea-bottom { animation-delay: 0.45s; }
.intro-titulo {
  font-family: 'Segoe UI', 'Arial Black', sans-serif;
  font-size: clamp(28px, 6vw, 56px);
  font-weight: 900;
  letter-spacing: 10px;
  color: #006f47;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(22px);
  animation: aparecer 0.9s ease forwards 2.3s;
}
.intro-subtitulo {
  font-family: 'Segoe UI', sans-serif;
  font-size: clamp(11px, 2vw, 17px);
  font-weight: 600;
  letter-spacing: 6px;
  color: #009960;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(14px);
  animation: aparecer 0.9s ease forwards 2.6s;
}
.intro-contenido {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}
@keyframes dibujar { to { stroke-dashoffset: 0; } }
@keyframes aparecer { to { opacity: 1; transform: translateY(0); } }















body{
font-family:Arial;
background:#f0f2f5;
padding:40px;
}

.composer{
background:white;
border-radius:12px;
padding:20px;
max-width:600px;
margin:auto;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px 15px;
background:#006341;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.tipo{
margin-top:15px;
}

.tipo button{
background:#ddd;
color:#333;
margin-right:10px;
}

.tipo button.activo{
background:#006341;
color:white;
}

</style>
</head>

<body>









    <div id="intro-screen">
  <div class="intro-contenido">
    <div class="intro-logo">
      <svg viewBox="-110 -90 540 380" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="grad-conalep" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#00c87a"/>
            <stop offset="50%"  stop-color="#009955"/>
            <stop offset="100%" stop-color="#006633"/>
          </linearGradient>
        </defs>
        <path class="linea-sombra linea-top"       d="M-110 55  Q160 -130 430 75"/>
        <path class="linea-sombra linea-bottom"    d="M-110 185 Q165  330 430 165"/>
        <path class="linea-principal linea-top"    d="M-110 55  Q160 -130 430 75"/>
        <path class="linea-principal linea-bottom" d="M-110 185 Q165  330 430 165"/>
      </svg>
    </div>
    <div class="intro-titulo">CONALEP</div>
    <div class="intro-subtitulo">Veracruz</div>
  </div>
</div>









<div class="composer">

<h2>Crear publicación</h2>

<textarea id="post-text" placeholder="¿Qué quieres compartir?"></textarea>

<br>

<input type="file" id="file-input">

<div class="tipo">

<b>Tipo de publicación:</b><br>

<button id="btn-publicacion">Publicación</button>

<button id="btn-direccion">Dirección</button>

<button id="btn-promocion">Promoción</button>

</div>

<br>

<button onclick="publicarPost()">Publicar</button>

</div>

<script>

// CONFIG FIREBASE
const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "undertale-web.firebaseapp.com",
projectId: "undertale-web",
storageBucket: "undertale-web.firebasestorage.app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

// VARIABLES
let tipo = "publicacion";
let postLocation = null;
let isPromotion = false;


// BOTONES
const btnPublicacion = document.getElementById("btn-publicacion");
const btnDireccion = document.getElementById("btn-direccion");
const btnPromocion = document.getElementById("btn-promocion");


// ACTIVAR PUBLICACION POR DEFECTO
btnPublicacion.classList.add("activo");


// FUNCION PARA CAMBIAR TIPO
function cambiarTipo(t){

tipo = t;
postLocation = null;
isPromotion = false;

document.querySelectorAll(".tipo button")
.forEach(b => b.classList.remove("activo"));

if(t==="publicacion"){
btnPublicacion.classList.add("activo");
}

if(t==="direccion"){
postLocation="CONALEP 165 Tuxpan";
btnDireccion.classList.add("activo");
}

if(t==="promocion"){
isPromotion=true;
btnPromocion.classList.add("activo");
}

}


// EVENTOS
btnPublicacion.onclick = () => cambiarTipo("publicacion");
btnDireccion.onclick = () => cambiarTipo("direccion");
btnPromocion.onclick = () => cambiarTipo("promocion");



// PUBLICAR
async function publicarPost(){

const text = document.getElementById("post-text").value.trim();
const file = document.getElementById("file-input").files[0];

let fileUrl = null;
let fileMeta = null;

try{

if(file){

const storageRef = storage.ref().child("posts/" + Date.now() + "_" + file.name);

await storageRef.put(file);

fileUrl = await storageRef.getDownloadURL();

fileMeta = {
name:file.name,
type:file.type,
size:file.size
};

}

await db.collection("posts").add({

texto: text,
fileUrl: fileUrl,
fileMeta: fileMeta,
isPromotion: isPromotion,
location: postLocation,
tipo: tipo,
createdAt: firebase.firestore.FieldValue.serverTimestamp()

});

alert("Publicación creada correctamente");

document.getElementById("post-text").value="";
document.getElementById("file-input").value="";

cambiarTipo("publicacion");

}catch(error){

console.error(error);
alert("Error al publicar");

}

}

</script>








<script>
  // La animación termina a los ~3.5s, luego fade out de 0.8s
  setTimeout(function () {
    var intro = document.getElementById('intro-screen');
    intro.classList.add('ocultar');
    setTimeout(function () { intro.remove(); }, 800);
  }, 3500);
</script>





</body>
</html>
