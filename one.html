<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONALEP Veracruz — Docente</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh; background: #1a1200;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}

.wrap {
  min-height: 100vh; width: 100%;
  background: #1a1200;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}

.deco { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.025); }

.intro {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  transition: opacity 0.9s ease; z-index: 2;
}
.intro.out { opacity: 0; pointer-events: none; }

.linea-sombra {
  fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 36;
  stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: 1300; stroke-dashoffset: 1300;
  animation: draw 2.2s cubic-bezier(0.77,0,0.18,1) forwards;
}
.linea-main {
  fill: none; stroke: url(#g1); stroke-width: 22;
  stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: 1300; stroke-dashoffset: 1300;
  animation: draw 2.2s cubic-bezier(0.77,0,0.18,1) forwards;
}
.lt { animation-delay: 0.05s; }
.lb { animation-delay: 0.5s; }

.wordmark {
  font-family: 'Segoe UI', 'Arial Black', sans-serif;
  font-size: 42px; font-weight: 900; letter-spacing: 12px;
  color: #fff; text-transform: uppercase;
  opacity: 0; transform: translateY(18px);
  animation: rise 0.8s ease forwards 2.4s;
}
.submark {
  font-size: 13px; font-weight: 500; letter-spacing: 7px;
  color: #ef9f27; text-transform: uppercase;
  opacity: 0; transform: translateY(10px);
  animation: rise 0.8s ease forwards 2.7s;
}

@keyframes draw { to { stroke-dashoffset: 0; } }
@keyframes rise { to { opacity: 1; transform: translateY(0); } }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
@keyframes pop-exit { to { opacity:0; transform: scale(0.92) translateY(-20px); } }

.card {
  opacity: 0; transform: translateY(16px);
  transition: opacity 0.7s ease, transform 0.7s ease;
  z-index: 2;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.13);
  border-radius: 20px; padding: 40px 44px;
  width: 340px; text-align: center;
}
.card.in { opacity: 1; transform: translateY(0); }
.card.shake { animation: shake 0.35s ease-in-out; }
.card.bye { animation: pop-exit 0.5s ease forwards; }

.avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(239,159,39,0.12);
  border: 0.5px solid rgba(239,159,39,0.3);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px;
}
.avatar svg { width: 26px; height: 26px; }

.eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #ef9f27; margin-bottom: 6px; }
.titulo { font-size: 22px; font-weight: 500; color: #fff9ed; margin-bottom: 4px; }
.subtitulo { font-size: 13px; color: rgba(255,243,210,0.4); margin-bottom: 28px; }

.error-msg {
  font-size: 12px; color: #f09595;
  background: rgba(240,149,149,0.1);
  border: 0.5px solid rgba(240,149,149,0.3);
  border-radius: 8px; padding: 8px 12px;
  margin-bottom: 16px; display: none;
}
.error-msg.show { display: block; }

.field { margin-bottom: 14px; text-align: left; }
.field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,243,210,0.45); margin-bottom: 7px; }
.field input {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.13);
  border-radius: 10px; color: #fff9ed;
  font-size: 14px; font-family: 'Segoe UI', Arial, sans-serif;
  outline: none; transition: border-color 0.2s, background 0.2s;
}
.field input::placeholder { color: rgba(255,243,210,0.2); }
.field input:focus { border-color: rgba(239,159,39,0.55); background: rgba(239,159,39,0.05); }

.btn-submit {
  width: 100%; padding: 13px;
  background: #ba7517; border: none; border-radius: 10px;
  color: #fff9ed; font-size: 15px; font-weight: 500;
  font-family: 'Segoe UI', Arial, sans-serif;
  cursor: pointer; margin-top: 6px;
  transition: background 0.2s, transform 0.15s;
}
.btn-submit:hover { background: #ef9f27; transform: translateY(-1px); }
.btn-submit:active { transform: scale(0.98); }

.success-overlay {
  position: absolute; inset: 0; z-index: 10;
  background: #1a1200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
.success-overlay.show { opacity: 1; pointer-events: all; }
.check-circle {
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(239,159,39,0.15);
  border: 0.5px solid rgba(239,159,39,0.4);
  display: flex; align-items: center; justify-content: center;
}
.check-circle svg { width: 28px; height: 28px; }
.success-title { font-size: 20px; font-weight: 500; color: #fff9ed; }
.success-sub { font-size: 13px; color: rgba(255,243,210,0.45); }
</style>
</head>
<body>
<div class="wrap">
  <div class="deco" style="width:420px;height:420px;top:-180px;left:-130px;"></div>
  <div class="deco" style="width:260px;height:260px;bottom:-100px;right:-60px;"></div>

  <div class="intro" id="intro">
    <svg viewBox="-110 -90 540 370" style="width:260px;height:auto;">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#fac775"/>
          <stop offset="50%" stop-color="#ef9f27"/>
          <stop offset="100%" stop-color="#854f0b"/>
        </linearGradient>
      </defs>
      <path class="linea-sombra lt" d="M-110 55  Q160 -130 430 75"/>
      <path class="linea-sombra lb" d="M-110 185 Q165  330 430 165"/>
      <path class="linea-main lt"   d="M-110 55  Q160 -130 430 75"/>
      <path class="linea-main lb"   d="M-110 185 Q165  330 430 165"/>
    </svg>
    <div class="wordmark">CONALEP</div>
    <div class="submark">Veracruz</div>
  </div>

  <div class="card" id="card">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ef9f27" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="13" rx="2"/>
        <path d="M8 21h8M12 16v5"/>
        <path d="M7 8h10M7 11h6"/>
      </svg>
    </div>
    <div class="eyebrow">Panel de control</div>
    <div class="titulo">Acceso docente</div>
    <div class="subtitulo">Ingresa tus credenciales institucionales</div>

    <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos</div>

    <div class="field">
      <label>Usuario</label>
      <input type="text" id="userInput" placeholder="Ej. profesor1"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="passInput" placeholder="••••••••"/>
    </div>

    <button class="btn-submit" id="btnLogin">Ingresar</button>
  </div>

  <div class="success-overlay" id="successOverlay">
    <div class="check-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ef9f27" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="success-title">Acceso concedido</div>
    <div class="success-sub">Redirigiendo al panel...</div>
  </div>
</div>

<script>
  setTimeout(function() {
    var intro = document.getElementById('intro');
    var card  = document.getElementById('card');
    intro.classList.add('out');
    setTimeout(function() {
      intro.style.display = 'none';
      card.classList.add('in');
    }, 900);
  }, 3600);

  document.getElementById('btnLogin').addEventListener('click', function() {
    var user = document.getElementById('userInput').value;
    var pass = document.getElementById('passInput').value;
    var card = document.getElementById('card');
    var err  = document.getElementById('errorMsg');
    if (user === 'profesor1' && pass === 'conaction') {
      err.classList.remove('show');
      card.classList.add('bye');
      setTimeout(function() {
        document.getElementById('successOverlay').classList.add('show');
        setTimeout(function() {
          window.location.href = 'principaldocentes.html';
        }, 1200);
      }, 500);
    } else {
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
      err.classList.add('show');
    }
  });

  document.getElementById('passInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('btnLogin').click();
  });
</script>
</body>
</html>
